name: Build Windows (portable + installer)

# On every push to main (and via manual dispatch):
#   1. build  - cross-compile Windows amd64, assemble portable + installer zips
#   2. smoke-test - on a real Windows runner, start tailscaled and verify the
#                   daemon comes up and reads proxy.conf
#   3. release - only if the smoke test passes, publish the rolling pre-release

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
  workflow_dispatch:
    inputs:
      release_version:
        description: "Release version label (e.g. 1.0). Leave blank to auto-version from git."
        required: false
        default: ""

permissions:
  contents: write # needed to publish the rolling release

concurrency:
  group: build-windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      short: ${{ steps.ver.outputs.short }}
      long: ${{ steps.ver.outputs.long }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags so version stamping works

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Compute version
        id: ver
        run: |
          eval "$(go run ./cmd/mkversion)"
          # A manual workflow_dispatch can override the version label (e.g. "1.0")
          # for a clean, human-friendly release tag. Otherwise auto-version from git.
          CUSTOM="${{ github.event.inputs.release_version }}"
          if [ -n "${CUSTOM}" ]; then
            VERSION_SHORT="${CUSTOM}"
            VERSION_LONG="${CUSTOM}"
          fi
          echo "short=${VERSION_SHORT}" >> "$GITHUB_OUTPUT"
          echo "long=${VERSION_LONG}" >> "$GITHUB_OUTPUT"
          echo "Building version ${VERSION_LONG}"

      - name: Run unit tests (modified packages)
        run: |
          set -eu
          # Gate the release on the tests for the packages this fork modifies.
          go test ./net/socks5/... ./net/tshttpproxy/... ./log/filelogger/...
          # Integrated peer-facing features (HTTP proxy + file share) + built-in
          # metrics reporter (in-daemon replacement for metrics-report.ps1).
          go test -v ./cmd/tailscaled/ -run 'Peer|OneConnListener|Metrics|NodeNetcheck|NodeShouldReapply|FolderShare'
          # DERP anti-flapping: ping/timeout decision + "forced (assigned) home
          # sticks, auto-switch only after 30s dead". Validate across all cases.
          go test -v -run 'DerpPingOnce|DerpFastPingTimeoutPolicy|DerpForced' ./wgengine/magicsock/
          # Combined single-file node binary (daemon+CLI+launcher in one exe):
          # verify it compiles for both OSes with the node launcher linked in.
          GOOS=linux   go build -tags ts_include_cli -ldflags "-X main.nodeMode=proxy" -o /dev/null ./cmd/tailscaled
          GOOS=windows go build -tags ts_include_cli -ldflags "-X main.nodeMode=proxy" -o /dev/null ./cmd/tailscaled
          # VPN variant's trimmed feature set: featuretags --remove validates the
          # dependency graph, then confirm the omit tags actually compile (wintun
          # embed is exercised by the real build step).
          OMIT=$(go run ./cmd/featuretags --remove=ssh,taildrop,webclient,systray,kube,tpm,wakeonlan,qrcodes,clientupdate,tailnetlock,appconnectors)
          echo "vpn omit tags: $OMIT"
          GOOS=windows go build -tags "ts_include_cli,${OMIT}" -o /dev/null ./cmd/tailscaled

      - name: Build Windows binaries (amd64)
        run: |
          set -eu
          mkdir -p build/bin
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 \
            sh ./build_dist.sh -o build/bin/tailscale.exe  tailscale.com/cmd/tailscale
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 \
            sh ./build_dist.sh -o build/bin/tailscaled.exe tailscale.com/cmd/tailscaled

      - name: Fetch wintun.dll (for the full-VPN installer)
        run: |
          set -eu
          curl -fL --retry 3 -o wintun.zip https://www.wintun.net/builds/wintun-0.14.1.zip
          mkdir -p build/wintun
          unzip -j wintun.zip 'wintun/bin/amd64/wintun.dll' -d build/wintun
          ls -la build/wintun

      - name: Build + assemble single-file node binaries and installer
        id: pkg
        run: |
          set -eu
          ver="${{ steps.ver.outputs.long }}"
          # Build number tăng đơn điệu theo run — khóa so sánh cho auto-update.
          # PHẢI khớp dòng `build:` trong notes.md của job release (cùng run_number).
          build="${{ github.run_number }}"
          mkdir -p dist build/node

          # Make the WINDOWS node exes require Administrator so double-clicking
          # elevates ONCE (one UAC prompt) and the forked daemon child inherits
          # admin to create the LocalAPI pipe — no runtime self-relaunch.
          # cmd/tailscaled already ships manifest_windows_amd64.syso (asInvoker);
          # we OVERWRITE it here with the requireAdministrator variant using
          # tailscale's own mkmanifest, so there is still exactly one .rsrc
          # section. This runs AFTER the installer tailscaled is built (it keeps
          # the default asInvoker manifest) and only affects the node build below.
          go run tailscale.com/cmd/mkmanifest amd64 \
            cmd/tailscaled/node.manifest cmd/tailscaled/manifest_windows_amd64.syso
          ls -la cmd/tailscaled/manifest_windows_amd64.syso

          # --- Combined single-file node binaries (daemon + CLI + launcher) ---
          # --box links the CLI (ts_include_cli) so ONE exe is daemon+CLI; the
          # baked launcher (-X main.nodeMode) makes it self-run. No gost / PAC /
          # .bat / .vbs clutter; metrics is built into the daemon.
          # Nhúng version/build/variant để auto-update biết binary hiện tại là
          # gì (variant khớp asset name server tra ở /api/client/latest).
          upd="-X main.nodeVersion=$ver -X main.nodeBuild=$build"
          for v in proxy portable; do
            EXTRA_LDFLAGS="-s -w -X main.nodeMode=$v $upd -X main.nodeVariant=$v" GOOS=windows GOARCH=amd64 CGO_ENABLED=0 \
              sh ./build_dist.sh --box -o "build/node/tailscale-node-$v.exe" tailscale.com/cmd/tailscaled
          done
          EXTRA_LDFLAGS="-s -w -X main.nodeMode=portable $upd -X main.nodeVariant=linux-amd64" GOOS=linux GOARCH=amd64 CGO_ENABLED=0 \
            sh ./build_dist.sh --box -o "build/node/tailscale-node-linux-amd64" tailscale.com/cmd/tailscaled

          # VPN variant (Windows): dual-mode (userspace default OFF -> baked TUN)
          # with wintun.dll EMBEDDED so the single exe runs a real VPN interface.
          # `<exe>`/`<exe> tun`/`<exe> vpn` = TUN; `<exe> userspace` = SOCKS5.
          # Also carries the shared install/uninstall verbs. ts_include_cli +
          # ts_node_wintun (no --box, since --box refuses a custom $TAGS). go:embed
          # needs wintun.dll in the package dir at build time.
          #
          # Trimmed: drop tailscaled components a headscale node never uses
          # (SSH server, Taildrop, web client, systray, kube, tpm, wake-on-lan,
          # QR codes, client auto-update, network lock, app connectors) for a
          # leaner/faster binary. featuretags --remove validates dependencies
          # and errors if a removal is unsafe. Taildrive is KEPT (not omitted)
          # — the per-PC folder-share feature drives it from the dashboard.
          OMIT=$(go run ./cmd/featuretags --remove=ssh,taildrop,webclient,systray,kube,tpm,wakeonlan,qrcodes,clientupdate,tailnetlock,appconnectors)
          echo "vpn omit tags: $OMIT"
          cp build/wintun/wintun.dll cmd/tailscaled/wintun.dll
          EXTRA_LDFLAGS="-s -w -X main.nodeMode=portable -X main.nodeDefaultMode=tun $upd -X main.nodeVariant=vpn" \
            TAGS="ts_include_cli,ts_node_wintun,${OMIT}" GOOS=windows GOARCH=amd64 CGO_ENABLED=0 \
            sh ./build_dist.sh -o "build/node/tailscale-node-vpn.exe" tailscale.com/cmd/tailscaled

          # portable (Windows) + linux + vpn: a single self-contained file each.
          cp "build/node/tailscale-node-portable.exe" "dist/tailscale-node-portable-windows-amd64-${ver}.exe"
          cp "build/node/tailscale-node-linux-amd64"   "dist/tailscale-node-linux-amd64-${ver}"
          cp "build/node/tailscale-node-vpn.exe"       "dist/tailscale-node-vpn-windows-amd64-${ver}.exe"
          # vpn also as a zip bundled with an editable node.conf (control host),
          # for users who want to point the node at a different host without a
          # rebuild. The bare exe above still works standalone (baked host).
          vpn="tailscale-node-vpn-windows-amd64-${ver}"
          mkdir -p "dist/${vpn}"
          cp "build/node/tailscale-node-vpn.exe"    "dist/${vpn}/tailscale-node-vpn.exe"
          cp release/windows-portable/node.conf     "dist/${vpn}/node.conf"
          ( cd dist && zip -rq "${vpn}.zip" "${vpn}" )
          # proxy (Windows): exe + editable proxy.conf (corp upstream proxy config).
          proxy="tailscale-node-proxy-windows-amd64-${ver}"
          mkdir -p "dist/${proxy}"
          cp "build/node/tailscale-node-proxy.exe" "dist/${proxy}/tailscale-node-proxy.exe"
          cp release/windows-portable/proxy.conf    "dist/${proxy}/proxy.conf"
          ( cd dist && zip -rq "${proxy}.zip" "${proxy}" )

          # --- Full-VPN installer (unchanged: registers the tailscaled service) ---
          installer="tailscale-mod-installer-windows-amd64-${ver}"
          mkdir -p "dist/${installer}"
          cp build/bin/tailscale.exe build/bin/tailscaled.exe "dist/${installer}/"
          cp build/wintun/wintun.dll "dist/${installer}/"
          cp release/windows-installer/install.ps1 \
             release/windows-installer/uninstall.ps1 \
             release/windows-installer/install.bat \
             release/windows-installer/uninstall.bat \
             release/windows-installer/proxy.conf \
             release/windows-installer/README.txt "dist/${installer}/"
          ( cd dist && zip -rq "${installer}.zip" "${installer}" )

          # sha256 for every published artifact.
          ( cd dist && for f in *.exe *.zip "tailscale-node-linux-amd64-${ver}"; do [ -f "$f" ] && sha256sum "$f" > "$f.sha256"; done )
          ls -la dist

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            dist/*.zip
            dist/*.exe
            dist/tailscale-node-linux-amd64-*
            dist/*.sha256
          if-no-files-found: error
          retention-days: 30

  smoke-test:
    name: Smoke test on Windows runner
    needs: build
    runs-on: windows-latest
    steps:
      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: dist

      - name: Smoke test the single-file node binary (CLI + daemon)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $exe = Get-ChildItem dist/tailscale-node-portable-windows-amd64-*.exe | Select-Object -First 1
          if (-not $exe) { throw "FAIL: portable node exe not found in dist" }
          Write-Host "Testing single-file node binary: $($exe.Name)"

          # 1) CLI passthrough works (ts_include_cli linked into the one binary).
          $v = (& $exe.FullName version 2>&1 | Out-String)
          Write-Host $v
          if ($v -notmatch "1\.98") { throw "FAIL: node exe 'version' did not print a version (CLI not linked?)" }

          # 2) Daemon mode: the SAME exe run with tailscaled flags IS the daemon.
          $state = Join-Path $env:RUNNER_TEMP "nstate"
          New-Item -ItemType Directory -Force $state | Out-Null
          Write-Host "Starting node exe as a userspace daemon..."
          $p = Start-Process -FilePath $exe.FullName -PassThru -WindowStyle Hidden `
            -ArgumentList "--tun=userspace-networking","--statedir=$state","--verbose=1"
          try {
            $up = $false
            for ($i = 0; $i -lt 40; $i++) {
              Start-Sleep -Seconds 1
              $s = (& $exe.FullName status 2>&1 | Out-String)
              if ($s -notmatch "failed to connect") { $up = $true; Write-Host "daemon LocalAPI reachable after ~${i}s"; break }
            }
            if (-not $up) { throw "FAIL: node daemon LocalAPI never became reachable" }
            Write-Host "PASS: single-file node binary works as CLI (version) and as daemon (LocalAPI up)."
            exit 0
          }
          finally {
            if ($p -and -not $p.HasExited) { Stop-Process -Id $p.Id -Force -ErrorAction SilentlyContinue }
          }

  launcher-test:
    name: Node launcher live test (reaches headscale)
    needs: build
    runs-on: windows-latest
    steps:
      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: dist

      - name: Run the single-file node launcher and verify it reaches control
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $exe = (Get-ChildItem dist/tailscale-node-portable-windows-amd64-*.exe | Select-Object -First 1).FullName
          if (-not $exe) { throw "FAIL: node exe not found" }
          Write-Host "Launcher: $exe"
          (& $exe version 2>&1 | Out-String) | Write-Host

          # Run the launcher exactly like a user double-clicking it: it forks the
          # daemon and attempts 'up' against the baked self-host headscale (vpn2).
          # 'up' blocks on OIDC login, so run in the background and inspect state.
          $p = Start-Process -FilePath $exe -PassThru -WindowStyle Hidden -WorkingDirectory (Split-Path $exe)
          $ok = $false
          try {
            for ($i = 0; $i -lt 25; $i++) {
              Start-Sleep -Seconds 3
              $st = (& $exe status 2>&1 | Out-String)
              Write-Host "--- status @$i ---"
              ($st -split "`n" | Select-Object -First 5) | ForEach-Object { Write-Host $_ }
              if ($st -match "NeedsLogin|Logged out|To authenticate|log in at|register|vpn2\.hangocthanh") {
                $ok = $true; Write-Host ">> reached self-host headscale control (needs login)."; break
              }
            }
            $log = Join-Path (Split-Path $exe) "state/logs/tailscaled.log"
            if (Test-Path $log) {
              Write-Host "----- tailscaled.log (tail 30) -----"
              (Get-Content $log -Tail 30) | ForEach-Object { Write-Host $_ }
            }
          }
          finally {
            (& $exe stop 2>&1 | Out-String) | Write-Host
            Get-Process | Where-Object { $_.ProcessName -like "tailscale-node*" } | Stop-Process -Force -ErrorAction SilentlyContinue
            if ($p -and -not $p.HasExited) { Stop-Process -Id $p.Id -Force -ErrorAction SilentlyContinue }
          }
          if (-not $ok) { throw "FAIL: launcher never reached headscale control (see log above)" }
          Write-Host "PASS: single-file node launcher started the daemon and reached the self-host headscale (NeedsLogin)."

  release:
    name: Publish versioned release
    needs: [build, smoke-test] # build is required to read its version outputs
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: dist

      - name: Publish
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          TAG="v${{ needs.build.outputs.long }}"
          TITLE="Tailscale (mod) Windows ${TAG}"
          cat > notes.md <<'EOF'
          Automated build of Tailscale (mod). Verified on a Windows runner: the
          single-file node binary works as CLI and as a userspace daemon.

          Version: ${{ needs.build.outputs.long }} (commit ${{ github.sha }})
          build: ${{ github.run_number }}

          Single-file "node" builds — just run the one file (no gost / PAC / .bat):
          - **tailscale-node-vpn-windows-amd64-*.exe** (or the matching **.zip** with an editable `node.conf`) — dual-mode node with **wintun.dll embedded**. `<exe>` or `<exe> tun`/`vpn` = **real VPN interface** (OS `ping` + all apps route via the tailnet); `<exe> userspace` = SOCKS5 mode. `<exe> install`/`uninstall` = add/remove autostart; `<exe> stop` = down. One file, one UAC. **No phone-home**: logtail disabled (`--no-logs-no-support`), so it talks only to your host. Accepts advertised subnet routes (itop/proxy LAN) by default like the stock client — the OS keeps your local /24 more specific than a broad advertised /8, so internet stays up; set `accept_routes = off` in `node.conf` if a machine truly overlaps. Drop a **`node.conf`** next to the exe to change the control host / toggle routes without rebuilding. Trimmed of unused components (SSH/Taildrop/webclient/systray/kube/tpm/…) — Taildrive is kept, driving per-PC folder sharing from the dashboard.
          - **tailscale-node-portable-windows-amd64-*.exe** — plain userspace node. Double-click to run; connectivity via `<exe> ping` / SOCKS5 `127.0.0.1:7654`. Same `install`/`uninstall`/`stop`/CLI verbs (no embedded wintun, so no TUN).
          - **tailscale-node-proxy-windows-amd64-*.zip** — corp/proxy node (integrated HTTP proxy, advertises LAN, forces DERP). Ships with an editable `proxy.conf` (corp upstream proxy) next to the exe.
          - **tailscale-node-linux-amd64-*** — Linux node. Userspace by default; `<exe> tun` (or `TS_NODE_TUN=full`) for a real kernel TUN (needs root).

          Latency reporting is built into the daemon (`TS_METRICS_REPORT`, baked into the node builds). Full-VPN **installer** zip (Windows service + `wintun.dll`) is also attached.
          EOF
          # Each build gets its own version tag; mark the newest as "Latest".
          # Delete+recreate makes re-running the same commit idempotent.
          gh release delete "$TAG" --repo "$GITHUB_REPOSITORY" --cleanup-tag --yes 2>/dev/null || true
          gh release create "$TAG" --repo "$GITHUB_REPOSITORY" \
            --title "$TITLE" --notes-file notes.md --latest --target "$GITHUB_SHA" \
            dist/*.zip dist/*.exe "dist/tailscale-node-linux-amd64-${{ needs.build.outputs.long }}" dist/*.sha256
