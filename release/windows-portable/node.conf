# node.conf — cấu hình node (đặt CÙNG thư mục với file .exe).
# Bỏ file này đi thì exe vẫn chạy với host mặc định đã build sẵn.
# Sửa xong LƯU LẠI rồi chạy lại exe.

# URL control server (headscale) mà node kết nối tới:
login_server = https://vpn2.hangocthanh.io.vn

# URL dashboard nhận báo cáo latency/DERP (để trống = tắt báo cáo):
metrics_url = https://vpn2.hangocthanh.io.vn/app

# Nhận các dải subnet do máy khác (itop/proxy) quảng bá:
#   on  = vào thẳng được IP nội bộ itop (mặc định, giống client chuẩn).
#   off = chỉ ping node tailnet (100.64.x); dùng khi mạng LAN máy này
#         TRÙNG dải itop quảng bá và bị mất internet.
accept_routes = on

# (chỉ dùng cho bản proxy) dải LAN mà CHÍNH máy này quảng bá cho máy khác:
# advertise_routes = 10.0.0.0/8
